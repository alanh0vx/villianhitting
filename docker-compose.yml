services:
  dev:
    build: .
    init: true
    ports:
      - "8081:8081"
    volumes:
      - ./villain-hitting:/app
      - ./images:/images
      - metro-cache:/app/node_modules/.cache
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - CHOKIDAR_USEPOLLING=true
    stop_grace_period: 5s
    command: ["node", "node_modules/.bin/expo", "start", "--web", "--port", "8081"]

volumes:
  metro-cache:
